services:
  - type: web
    name: harish-event-calendar
    runtime: node
    plan: starter
    buildCommand: npm install
    preDeployCommand: node scripts/migrate-platform.js
    startCommand: node src/server.js
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
